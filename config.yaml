robot_capsules:
  - name: 'arm'
    link_name: 'link02'
    link_axis: 0
    radius: 0.05
    length: 0.35
    spatial_offset: [0,0,0]
    rotation_offset: [0,0,0]
    color: [1,0,0,0.3]
  
  - name: 'ee'
    link_name: 'link05'
    link_axis: 0
    radius: 0.055
    length: 0.22
    spatial_offset: [0,0,0]
    rotation_offset: [0,0,0]
    color: [1,0,0,0.3]

  - name: 'forearm'
    link_name: 'link03'
    link_axis: 0
    radius: 0.05
    length: 0.16
    spatial_offset: [0.06,0,0.05]
    rotation_offset: [0,-0.06283,0]
    color: [0,0,1,0.3]

obstacles_capsules:
  - name: 'fixed1'
    radius: 0.05
    point_A: [0.5,0.20,0]
    point_B: [0.5, 0.20, 0.25]
    color: [0, 1, 1, 1]

  - name: 'fixed2'
    radius: 0.05
    point_A: [0.5, -0.20, 0.]
    point_B: [0.5, -0.20, 0.25]
    color: [0, 1, 1, 1]

  - name: 'fixed3'
    radius: 0.05
    point_A: [0.5, -0.20, 0.25]
    point_B: [0.5, 0.20, 0.25]
    color: [0, 1, 1, 1]

spheres_robot:
  - name: 'ee_sphere'
    link_name: 'gripperMover'
    radius: 0.075  
    spatial_offset:  [0.035, 0., 0.] 
    color: [0,0.5,0.5,0.3]

collision_pairs:
