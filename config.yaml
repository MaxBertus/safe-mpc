# Robot & Environment Parameters
mass: 3.5     # platform mass [kg]
J:            # platform inertia [kg*m^2]
- [0.155, 0.0, 0.0]
- [0.0, 0.147, 0.0]
- [0.0, 0.0, 0.251]
l: 0.385      # length of the arm [m]
cf: 1.5e-3    # thrust coefficient [N/(Hz)^2]
ct: 4.590e-5  # torque coefficient [Nm/(Hz)^2]
max_w: 108    # max spinning rate [Hz]
alpha_tilt: 20     # Tilt cant angle [degree]

min_width: 0.525  # width/2 of the platform [m]
min_length: 0.475 # length/2 of the platform [m]
min_height: 0.2   # height/2 of the platform [m]

max_width: 1 # max width/2 of the environment [m]
max_length: 1 # max length/2 of the environment [m]
max_height: 1 # min width/2 of the environment [m]

v_min: [-5, -5, -6, -12.2, -12.2, -12.2]  # min initial velocity [m/s, rad/s]  for box dimensions 1x1x1
v_max: [5, 5, 6, 12.2, 12.2, 12.2]       # max initial velocity [m/s, rad/s] for box dimensions 1x1x1

# Data generation
orient_g_rej: true # select orientation with gravity rejection
